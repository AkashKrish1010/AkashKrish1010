name: 🤖 Daily Quote Update

on:
  schedule:
    # Runs every day at 6:00 AM UTC (11:30 AM IST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-quote:
    name: Fetch & Update Daily Quote
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: pip install google-genai

      - name: 🤖 Run Quote Generator
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{  secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: python update_quote.py

      - name: 📝 Commit & Push README Changes
        run: |
          git config --local user.email "akashkrish1010@gmail.com"
          git config --local user.name "AkashKrish1010"
          git add README.md
          git diff --staged --quiet || git commit -m "🤖 Daily Quote Update — $(date +'%Y-%m-%d')"
          git push
