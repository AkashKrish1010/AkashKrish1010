name: Update Quote

on:
  schedule:
    - cron: "0 0 * * *"   # daily once (5:30 AM IST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Quotely
        uses: ruchernchong/quotely@v1.1.0
        with:
          google-generative-ai-api-key: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
