            - name: Generate Daily Quote
  # You may pin to the exact commit or the version.
  # uses: ruchernchong/quotely@4fa41f13b2515ae2b9bddd128a89fd666231be2e
  uses: ruchernchong/quotely@v1.1.0
  with:
    # Google Generative AI API key for Gemini model
    google-api-key: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
    # LangFuse public key for observability (optional)
    langfuse-public-key: # optional
    # LangFuse secret key for observability (optional)
    langfuse-secret-key: # optional
    # LangFuse host URL (optional, e.g., https://cloud.langfuse.com)
    langfuse-host: # optional
    # Automatically commit and push changes to the repository
    auto-commit: # optional, default is true
          
